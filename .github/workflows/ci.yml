name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:

  # ── 1. Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: go build ./...

  # ── 2. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false   # golangci-lint-action manages its own cache

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest   # resolves to the latest golangci-lint v2.x release

  # ── 3. Test (race detector) ─────────────────────────────────────────────────
  test:
    name: Test (race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go test -race
        run: go test -race -count=1 ./...
